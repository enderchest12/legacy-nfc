<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEGACY</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    background:#000;
    color:white;
    font-family:Arial, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    width:100%;
    max-width:430px;
    background:linear-gradient(180deg,#111,#050505);
    border:1px solid rgba(255,204,0,.4);
    border-radius:28px;
    padding:28px;
    text-align:center;
    box-shadow:0 0 45px rgba(255,204,0,.25);
}

.logo{
    width:105px;
    height:105px;
    margin:0 auto 15px;
    border-radius:50%;
    background:#f1c40f;
    color:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:70px;
    font-weight:900;
    box-shadow:0 0 35px #f1c40f;
}

.brand{
    color:#f1c40f;
    font-size:34px;
    font-weight:900;
    letter-spacing:6px;
}

h1{
    margin-top:20px;
    font-size:25px;
}

.cargo{
    color:#bbb;
    margin-top:6px;
}

.title{
    margin-top:25px;
    margin-bottom:10px;
    color:#f1c40f;
    font-weight:bold;
    letter-spacing:2px;
    font-size:13px;
}

.btn{
    display:block;
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:15px;
    text-decoration:none;
    font-weight:bold;
}

.btn-dark{
    background:#151515;
    color:white;
    border:1px solid rgba(255,204,0,.3);
}

.btn-yellow{
    background:#f1c40f;
    color:#000;
}

.bank{
    text-align:left;
    background:#0d0d0d;
    border:1px solid rgba(255,204,0,.3);
    border-radius:18px;
    padding:18px;
    line-height:1.7;
    font-size:14px;
}

.qr{
    width:130px;
    margin-top:20px;
    border:3px solid #f1c40f;
    border-radius:15px;
}

@media (min-width:768px){
    .card{
        max-width:520px;
        padding:40px;
    }

    .logo{
        width:130px;
        height:130px;
        font-size:85px;
    }

    .brand{
        font-size:42px;
    }
}

@media (max-width:400px){
    .card{
        padding:22px;
        border-radius:22px;
    }

    .brand{
        font-size:28px;
        letter-spacing:4px;
    }

    h1{
        font-size:22px;
    }
}
</style>
</head>

<body>

<div class="card">

    <div class="logo">S</div>
    <div class="brand">LEGACY</div>

    <h1>{{ user.nombre }}</h1>
    <p class="cargo">{{ user.cargo }}</p>

    <div class="title">REDES SOCIALES</div>

  <a href="https://wa.me/{{ user.whatsapp }}">
WhatsApp
</a>
  <a href="{{ user.instagram }}">
Instagram
</a>
   <a href="{{ user.facebook }}" class="btn btn-dark">
Facebook
</a>
    <div class="title">PAGOS Y TRANSFERENCIA</div>

    <div class="bank">
        <strong>{{ user.banco }}</strong><br>
        {{ user.tipo_cuenta }}<br>
        {{ user.numero_cuenta }}<br>
        RUT: {{ user.rut_pago }}
    </div>

    {% if user.link_mercadopago %}
    <a href="{{ user.link_mercadopago }}" class="btn btn-yellow">Pagar con Mercado Pago</a>
    {% endif %}

    <a href="/u/{{ user.slug }}/vcard" class="btn btn-dark">Guardar Contacto</a>

    <img src="data:image/png;base64,{{ qr_code }}" class="qr">

</div>

</body>
</html>
